<!DOCTYPE html>
<html lang="en">
<head>
    <body style="background-color:#f08dc7; color:white;">
    
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopEase</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .hero {
      background-color: #f08dc7;
      padding: 80px 0;
      text-align: center;
    }

    .card:hover {
      transform: scale(1.03);
      transition: 0.0s;
    }

    footer {
      background: #2a2d30;
      color: rgb(251, 245, 248);
      text-align: center;
      padding: 15px;
      margin-top: 30px;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="#">ShopEase</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Offers</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero">
    <div class="container">
      <h1>Welcome to ShopEase</h1>
      <p>Your One-Stop Online Shopping Store</p>
      <a href="#" class="btn btn-primary">Shop Now</a>
    </div>
  </section>

  <!-- Products -->
  <div class="container my-5">
    <h2 class="text-center mb-4">Featured Products</h2>

    <div class="row g-4">

      <div class="col-md-3">
        <div class="card">
          <img src="https://th.bing.com/th/id/OIP.bUVZCPennOYGxO2dcQho-QHaHa?w=168&h=180&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3" class="card-img-top" alt="Product">
          <div class="card-body text-center">
            <h5>Smart Watch</h5>
            <p>₹1,999</p>
            <button class="btn btn-success">Buy Now</button>
          </div>
        </div>
      </div>

      <div class="col-md-3">
        <div class="card">
          <img src="https://th.bing.com/th/id/OIP.EBb4g6f9Cx3fYkO7Z4e6igHaHa?w=170&h=180&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3" class="card-img-top" alt="Product">
          <div class="card-body text-center">
            <h5>Headphones</h5>
            <p>₹999</p>
            <button class="btn btn-success">Buy Now</button>
          </div>
        </div>
      </div>

      <div class="col-md-3">
        <div class="card">
          <img src="https://th.bing.com/th/id/OIP.6wBiZYYo08ckcCS82xehfQHaHa?w=183&h=183&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3" class="card-img-top" alt="Product">
          <div class="card-body text-center">
            <h5>Mobile Phone</h5>
            <p>₹15,999</p>
            <button class="btn btn-success">Buy Now</button>
          </div>
        </div>
      </div>

      <div class="col-md-3">
        <div class="card">
          <img src="https://th.bing.com/th/id/OIP.D6Nd8_xZsOadqAikWvat_QHaH_?w=130&h=150&c=6&o=7&dpr=1.3&pid=1.7&rm=3" class="card-img-top" alt="Product">
          <div class="card-body text-center">
            <h5>Speaker</h5>
            <p>₹49,999</p>
            <button class="btn btn-success">Buy Now</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Contact -->
  <div class="container my-5">
    <h2 class="text-center mb-4">Contact Us</h2>

    <form>
      <div class="mb-3">
        <input type="text" class="form-control" placeholder="Your Name">
      </div>

      <div class="mb-3">
        <input type="email" class="form-control" placeholder="Your Email">
      </div>

      <div class="mb-3">
        <textarea class="form-control" rows="4" placeholder="Message"></textarea>
      </div>

      <button type="submit" class="btn btn-primary">Send</button>
    </form>
  </div>

  <!-- Footer -->
  <footer>
    <p>©️ 2026 ShopEase. All Rights Reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
